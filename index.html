<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>المساعد القرآني الذكي - Hybrid Search 2026</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap");
            body {
                font-family: "Tajawal", sans-serif;
                background-color: #f8fafc;
            }
            .quran-text {
                font-family: "Amiri", serif;
                font-size: 1.75rem;
                line-height: 3.2rem;
                color: #0f172a;
            }
            .card-local {
                border-right: 6px solid #10b981;
            } /* أخضر للبحث النصي */
            .card-ai {
                border-right: 6px solid #3b82f6;
            } /* أزرق للبحث الذكي */
            mark {
                background-color: #fef08a;
                padding: 0 4px;
                border-radius: 4px;
            }
        </style>
    </head>
    <body class="p-4 md:p-12">
        <div class="max-w-5xl mx-auto">
            <header class="text-center mb-12">
                <h1 class="text-5xl font-bold text-slate-900 mb-3">
                    الباحث القرآني الذكي
                </h1>
                <p class="text-slate-500 text-lg">
                    دمج البرمجة المنطقية مع قوة الذكاء الاصطناعي
                </p>
            </header>

            <div
                class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8"
            >
                <details class="group">
                    <summary
                        class="flex justify-between items-center cursor-pointer list-none font-bold text-slate-700"
                    >
                        <span>إعدادات مفتاح Gemini API</span>
                        <span class="transition group-open:rotate-180">▼</span>
                    </summary>
                    <div class="mt-5 flex flex-col md:flex-row gap-3">
                        <input
                            type="password"
                            id="apiKey"
                            class="flex-1 p-3 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50"
                            placeholder="أدخل مفتاحك (AIzaSy...)"
                        />
                        <button
                            onclick="saveApiKey()"
                            class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition shadow-lg"
                        >
                            حفظ المفتاح
                        </button>
                    </div>
                    <p class="text-[11px] text-slate-400 mt-3">
                        يتم تخزين المفتاح محلياً في متصفحك (LocalStorage) لضمان
                        الخصوصية.
                    </p>
                </details>
            </div>

            <div class="flex flex-col md:flex-row gap-3 mb-12">
                <input
                    type="text"
                    id="searchInput"
                    class="flex-[3] p-5 rounded-3xl border-none shadow-xl text-xl outline-none focus:ring-4 focus:ring-blue-100"
                    placeholder="ابحث بكلمة، أو اطرح سؤالاً سياقياً (مثلاً: آيات تتحدث عن فضل العلم)..."
                    onkeypress="if(event.key === 'Enter') startSearch()"
                />
                <button
                    onclick="startSearch()"
                    id="searchBtn"
                    class="flex-1 bg-blue-700 text-white px-10 py-5 rounded-3xl font-bold text-xl shadow-2xl hover:bg-blue-800 transition active:scale-95"
                >
                    إطلاق البحث
                </button>
            </div>

            <div id="loader" class="hidden text-center py-10">
                <div
                    class="inline-flex items-center gap-3 px-6 py-3 bg-white rounded-full shadow-md border border-slate-100"
                >
                    <div
                        class="w-4 h-4 bg-blue-600 rounded-full animate-ping"
                    ></div>
                    <span class="text-slate-600 font-medium"
                        >جاري تحليل البيانات عبر Gemini...</span
                    >
                </div>
            </div>

            <div id="resultsContainer" class="space-y-8"></div>
        </div>

        <script>
            let quranData = [];
            let totalCount = 0;

            // 1. تشغيل عند تحميل الصفحة
            window.onload = async () => {
                const savedKey = localStorage.getItem("gemini_api_key");
                if (savedKey)
                    document.getElementById("apiKey").value = savedKey;

                try {
                    const response = await fetch("quran.json");
                    if (!response.ok) throw new Error("الملف غير موجود");
                    quranData = await response.json();
                    console.log("Quran DB Loaded Successfully.");
                } catch (err) {
                    renderErrorMessage(
                        "خطأ: لم نتمكن من العثور على ملف quran.json بجانب السكربت.",
                    );
                }
            };

            // 2. حفظ المفتاح
            function saveApiKey() {
                const key = document.getElementById("apiKey").value.trim();
                localStorage.setItem("gemini_api_key", key);
                alert("تم حفظ المفتاح بنجاح!");
            }

            // 3. الدالة الرئيسية للبحث
            async function startSearch() {
                const query = document
                    .getElementById("searchInput")
                    .value.trim();
                const apiKey = document.getElementById("apiKey").value.trim();
                const container = document.getElementById("resultsContainer");
                const loader = document.getElementById("loader");

                if (!query) return;

                // تهيئة الواجهة للبحث الجديد
                container.innerHTML = "";
                totalCount = 0;

                // أ- البحث المحلي (السريع)
                const localResults = searchLocally(query);
                if (localResults.length > 0) {
                    totalCount += localResults.length;
                    renderSection(
                        "نتائج مطابقة للنص (Local)",
                        localResults,
                        "card-local",
                    );
                }

                // ب- البحث عبر الذكاء الاصطناعي (الدلالي)
                if (apiKey) {
                    loader.classList.remove("hidden");
                    try {
                        const aiResults = await searchViaAI(query, apiKey);
                        if (aiResults && aiResults.length > 0) {
                            totalCount += aiResults.length;
                            renderSection(
                                "نتائج تحليل المعنى (AI Analytics)",
                                aiResults,
                                "card-ai",
                            );
                        }
                    } catch (error) {
                        renderErrorMessage("تنبيه من Gemini: " + error.message);
                    } finally {
                        loader.classList.add("hidden");
                        displaySummary(query);
                    }
                } else {
                    displaySummary(query);
                    if (localResults.length === 0) {
                        renderErrorMessage(
                            "لم نجد نتائج نصية. يرجى إدخال مفتاح API لتفعيل البحث الذكي.",
                        );
                    }
                }
            }

            // 4. محرك البحث المحلي (Literal Matching)
            function searchLocally(query) {
                let matches = [];
                quranData.forEach((surah) => {
                    surah.verses.forEach((verse) => {
                        if (verse.text.includes(query)) {
                            matches.push({ surah: surah.id, ayah: verse.id });
                        }
                    });
                });
                return matches.slice(0, 8); // تحديد العدد لمنع الإطالة
            }

            // 5. محرك البحث الذكي (Semantic AI)
            async function searchViaAI(query, key) {
                // استخدام v1 المستقر مع الموديل المختار
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

                const prompt = `ابحث في القرآن عن آيات تتعلق بـ: "${query}". رد بمصفوفة JSON فقط: [{"surah": 1, "ayah": 1}]. لا تكتب أي نص إضافي إطلاقاً.`;

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.1 },
                    }),
                });

                if (!response.ok)
                    throw new Error(
                        `Status ${response.status}. تأكد من صلاحية المفتاح والرابط.`,
                    );

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const jsonPart = rawText.match(/\[.*\]/s);
                return jsonPart ? JSON.parse(jsonPart[0]) : [];
            }

            // 6. عرض ملخص البحث (عدد النتائج)
            function displaySummary(query) {
                const container = document.getElementById("resultsContainer");
                const summaryDiv = document.createElement("div");
                summaryDiv.className =
                    "flex justify-between items-center p-4 bg-slate-100 rounded-2xl text-slate-600 text-sm border border-slate-200";
                summaryDiv.innerHTML = `
                <span>كلمة البحث: <strong class="text-slate-900">"${query}"</strong></span>
                <span>إجمالي الآيات المستخرجة: <strong class="text-blue-700 text-lg">${totalCount}</strong></span>
            `;
                container.prepend(summaryDiv);
            }

            // 7. بناء الواجهة للنتائج
            function renderSection(title, items, styleClass) {
                const container = document.getElementById("resultsContainer");
                const section = document.createElement("div");
                section.innerHTML = `<h3 class="text-slate-400 font-bold mb-4 mt-8 text-xs uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-current"></span> ${title}</h3>`;

                items.forEach((item) => {
                    const sInfo = quranData.find((s) => s.id === item.surah);
                    if (sInfo) {
                        const vInfo = sInfo.verses.find(
                            (v) => v.id === item.ayah,
                        );
                        if (vInfo) {
                            const card = document.createElement("div");
                            card.className = `bg-white p-8 rounded-3xl shadow-sm mb-5 transition-all hover:shadow-xl hover:-translate-y-1 border border-slate-100 ${styleClass}`;
                            card.innerHTML = `
                            <div class="flex justify-between items-center mb-6">
                                <span class="bg-blue-50 text-blue-700 px-4 py-1 rounded-full text-xs font-bold">سورة ${sInfo.name} | آية ${vInfo.id}</span>
                                <button onclick="navigator.clipboard.writeText('${vInfo.text}')" class="text-slate-300 hover:text-blue-500 text-xs">نسخ النص</button>
                            </div>
                            <p class="quran-text text-right" dir="rtl">${vInfo.text} ﴿${vInfo.id}﴾</p>
                        `;
                            section.appendChild(card);
                        }
                    }
                });
                container.appendChild(section);
            }

            function renderErrorMessage(msg) {
                const container = document.getElementById("resultsContainer");
                container.innerHTML += `<div class="p-6 bg-red-50 text-red-700 border-2 border-red-100 rounded-3xl text-center font-bold">${msg}</div>`;
            }
        </script>
    </body>
</html>
