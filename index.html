<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>المساعد القرآني - النسخة المستقرة</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap");
            body {
                font-family: "Tajawal", sans-serif;
                background-color: #f3f4f6;
            }
            .quran-text {
                font-family: "Amiri", serif;
                font-size: 1.7rem;
                line-height: 3rem;
                color: #111827;
            }
            .card-local {
                border-right: 5px solid #059669;
            }
            .card-ai {
                border-right: 5px solid #2563eb;
            }
        </style>
    </head>
    <body class="p-4 md:p-10">
        <div class="max-w-4xl mx-auto">
            <header class="text-center mb-8">
                <h1 class="text-4xl font-bold text-gray-900 mb-2">
                    الباحث القرآني الهجين
                </h1>
                <p class="text-blue-600 font-medium">
                    بحث نصي محلي + تحليل ذكي (Gemini 2026)
                </p>
            </header>

            <div
                class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-200"
            >
                <div class="flex flex-col md:flex-row gap-3">
                    <input
                        type="password"
                        id="apiKey"
                        class="flex-1 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="أدخل مفتاح API هنا..."
                    />
                    <button
                        onclick="saveKey()"
                        class="bg-gray-800 text-white px-6 py-3 rounded-xl hover:bg-black transition"
                    >
                        حفظ المفتاح
                    </button>
                </div>
                <div id="keyNote" class="text-xs text-gray-400 mt-2">
                    المفتاح يُحفظ في متصفحك فقط ولا يُرسل لأي خادم وسيط.
                </div>
            </div>

            <div class="flex gap-2 mb-10">
                <input
                    type="text"
                    id="searchInput"
                    class="flex-1 p-5 rounded-2xl border-none shadow-lg text-lg outline-none focus:ring-2 focus:ring-blue-600"
                    placeholder="اكتب كلمة أو اسأل عن موضوع سياقي..."
                />
                <button
                    onclick="runPowerSearch()"
                    id="mainBtn"
                    class="bg-blue-600 text-white px-10 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition"
                >
                    بحث
                </button>
            </div>

            <div id="loader" class="hidden text-center py-10">
                <div
                    class="inline-block animate-bounce bg-blue-600 p-2 px-4 text-white rounded-full text-sm"
                >
                    جاري التفكير برمجياً...
                </div>
            </div>

            <div id="resultsArea" class="space-y-6"></div>
        </div>

        <script>
            let quranJSON = [];

            // تحميل البيانات عند فتح الصفحة
            window.onload = async () => {
                const saved = localStorage.getItem("gemini_key");
                if (saved) document.getElementById("apiKey").value = saved;

                try {
                    const res = await fetch("quran.json");
                    quranJSON = await res.json();
                    console.log("✅ تم تحميل المصحف محلياً");
                } catch (e) {
                    renderError(
                        "فشل تحميل ملف quran.json. تأكد أنه في نفس المجلد.",
                    );
                }
            };

            function saveKey() {
                localStorage.setItem(
                    "gemini_key",
                    document.getElementById("apiKey").value,
                );
                alert("تم الحفظ!");
            }

            async function runPowerSearch() {
                const query = document
                    .getElementById("searchInput")
                    .value.trim();
                const key = document.getElementById("apiKey").value;
                const area = document.getElementById("resultsArea");
                const loader = document.getElementById("loader");

                if (!query) return;
                area.innerHTML = "";

                // 1. البحث المحلي (Literal Search)
                const localHits = findInJson(query);
                if (localHits.length > 0) {
                    renderSection(
                        "نتائج مطابقة للنص (محلي)",
                        localHits,
                        "card-local",
                    );
                }

                // 2. البحث الذكي (Semantic Search)
                if (key) {
                    loader.classList.remove("hidden");
                    try {
                        const aiHits = await askGemini(query, key);
                        if (aiHits.length > 0) {
                            renderSection(
                                "نتائج تحليل المعنى (الذكاء الاصطناعي)",
                                aiHits,
                                "card-ai",
                            );
                        }
                    } catch (err) {
                        renderError("تنبيه الـ AI: " + err.message);
                    } finally {
                        loader.classList.add("hidden");
                    }
                } else if (localHits.length === 0) {
                    renderError(
                        "لم نجد نتائج نصية. أدخل مفتاح API لتفعيل البحث بالمعنى.",
                    );
                }
            }

            function findInJson(term) {
                let results = [];
                // بحث بسيط يتجاهل التشكيل قليلاً (يمكن تحسينه برمجياً لاحقاً)
                quranJSON.forEach((s) => {
                    s.verses.forEach((v) => {
                        if (v.text.includes(term)) {
                            results.push({ surah: s.id, ayah: v.id });
                        }
                    });
                });
                return results.slice(0, 5);
            }

            async function askGemini(promptQuery, key) {
                // تحديث الرابط إلى v1 المستقر لعام 2026 لتجنب 404
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${key}`;

                const payload = {
                    contents: [
                        {
                            parts: [
                                {
                                    text: `ابحث في القرآن عن آيات تخص: "${promptQuery}". رد بمصفوفة JSON فقط: [{"surah": 1, "ayah": 1}]. لا تزد حرفاً واحداً.`,
                                },
                            ],
                        },
                    ],
                    generationConfig: { temperature: 0.1 },
                };

                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });

                if (!response.ok) {
                    if (response.status === 404)
                        throw new Error(
                            "الموديل غير موجود (404). تأكد من اسم الموديل أو الرابط.",
                        );
                    if (response.status === 429)
                        throw new Error("ضغط عالي (429). حاول بعد دقيقة.");
                    throw new Error("خطأ من الخادم: " + response.status);
                }

                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                const match = rawText.match(/\[.*\]/s);
                return match ? JSON.parse(match[0]) : [];
            }

            function renderSection(title, items, borderClass) {
                const area = document.getElementById("resultsArea");
                const section = document.createElement("div");
                section.innerHTML = `<h3 class="text-gray-400 font-bold mb-3 mt-6 text-sm">${title}</h3>`;

                items.forEach((item) => {
                    const sData = quranJSON.find((s) => s.id === item.surah);
                    if (sData) {
                        const vData = sData.verses.find(
                            (v) => v.id === item.ayah,
                        );
                        if (vData) {
                            const card = document.createElement("div");
                            card.className = `bg-white p-6 rounded-2xl shadow-sm mb-4 ${borderClass}`;
                            card.innerHTML = `
                            <div class="text-xs font-bold text-blue-600 mb-2">سورة ${sData.name} | آية ${vData.id}</div>
                            <p class="quran-text text-right">${vData.text} ﴿${vData.id}﴾</p>
                        `;
                            section.appendChild(card);
                        }
                    }
                });
                area.appendChild(section);
            }

            function renderError(msg) {
                const area = document.getElementById("resultsArea");
                area.innerHTML += `<div class="p-4 bg-orange-50 text-orange-700 border border-orange-200 rounded-2xl text-center">${msg}</div>`;
            }
        </script>
    </body>
</html>
